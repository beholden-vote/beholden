<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Beholden">
  <rect width="512" height="512" fill="#06131d"/>

  <!-- faint district-polygon motif, echoing the hero art -->
  <g opacity="0.5" stroke="#0e3a52" stroke-width="3">
    <polygon points="70,60 230,40 250,190 110,220" fill="#4b83bd" fill-opacity="0.35"/>
    <polygon points="250,190 230,40 420,64 400,210" fill="#c25b5b" fill-opacity="0.35"/>
    <polygon points="110,220 250,190 268,360 130,410" fill="#4b83bd" fill-opacity="0.35"/>
    <polygon points="400,210 420,64 460,420 300,460" fill="#c25b5b" fill-opacity="0.35"/>
  </g>

  <!-- center "you are here" marker, doubling as an eye — beholden = watched, accountable -->
  <circle cx="256" cy="256" r="120" fill="#06131d" stroke="#17384f" stroke-width="6"/>
  <circle cx="256" cy="256" r="86" fill="#0e2536" stroke="#f2b134" stroke-width="5"/>
  <circle cx="256" cy="256" r="34" fill="#f2b134"/>
  <circle cx="256" cy="256" r="14" fill="#06131d"/>

  <!-- amber ring pulse arc, echoing the map's you-marker -->
  <path d="M 256 146 A 110 110 0 0 1 366 256" fill="none" stroke="#f2b134" stroke-width="6" stroke-linecap="round"/>

  <!-- frame accents matching the hero -->
  <rect x="0" y="0" width="512" height="10" fill="#f2b134"/>
  <rect x="0" y="502" width="512" height="10" fill="#17384f"/>
</svg>
