<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beholden — see how you are represented</title>
    <style>
      /* Full-viewport map: MapLibre paints into its container's box, so the
         container must have real dimensions — an unstyled div is 0px tall
         and renders nothing. */
      html, body { height: 100%; margin: 0; background: #04121c; }
      #root { position: fixed; inset: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
