name: etl-nightly
on:
  schedule:
    - cron: "0 6 * * *"        # nightly full rebuild
  workflow_dispatch:
    inputs:
      backfill_since: {description: "ISO date to backfill from", required: false}

# One full rebuild a night. The pipeline reconstructs everything from scratch each
# run (raw is not persisted between runs), so there's no cheap "light" intra-day
# pass — an every-4h full rebuild just re-ran the ~40-min legislation fetch six
# times and, with the one-at-a-time guard below, churned cancelled runs. Sub-daily
# freshness (PTR/votes, PRD G2) is a future optimization: persist raw to R2 and
# re-fetch only the fast-moving sources incrementally.
# One run at a time: a manual dispatch must never race the nightly's publish.
concurrency:
  group: etl-nightly
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    # The from-scratch fetch walks congress.gov sponsored legislation per member
    # (~40 min) then FEC totals + committee + by-employer rollups per candidate
    # (~3 calls each, rate-limited) — sequentially, ~2.5-3 h against 1k/hr API
    # caps. 120 min was too tight once WO-3 tripled the FEC volume, so a full
    # rebuild timed out mid-fetch and never published. Give it real headroom
    # (GitHub's job ceiling is 6 h); the standing fix is to parallelize the two
    # independent API loops + persist raw to R2 for incremental fetch (see header).
    timeout-minutes: 330
    permissions:
      contents: write        # the pipeline-version tag push at the end of the run
    env:
      PYTHONUNBUFFERED: "1"   # flush fetch progress live so a timeout shows where it stalled
      CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
      FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e "./pipelines[dev]"
      - name: Set pipeline version (stamped into every provenance envelope)
        # Computed BEFORE build so dossiers carry the real release id, and the
        # end-of-run tag records exactly what was published (contracts §7).
        run: echo "PIPELINE_VERSION=etl-$(date -u +%Y.%W.%H%M)" >> "$GITHUB_ENV"
      - name: Unit tests (fail before spending API calls)
        run: pytest pipelines/tests -q
      - name: Fetch + land raw (immutable)
        run: make fetch   # snapshots -> dist/raw (publish lands them in R2 /raw/{date}/)
      - name: Transform (DuckDB) + quality gates
        run: make transform   # FAILS closed if spine resolution < 0.995
      - name: Build serving artifacts
        run: make build   # dossiers/ stylefeeds/ pins/ coverage.json
      - name: Publish
        run: make publish # serving JSON -> R2 bucket root; raw lake -> R2 /raw/{date}/
      - name: Tag pipeline version
        run: |
          git tag "$PIPELINE_VERSION" && git push origin "$PIPELINE_VERSION"
