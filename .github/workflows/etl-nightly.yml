name: etl-nightly
on:
  schedule:
    - cron: "0 6 * * *"        # nightly full rebuild
  workflow_dispatch:
    inputs:
      backfill_since: {description: "ISO date to backfill from", required: false}
      full_rebuild:
        description: "Bypass raw-lake hydration + freshness — re-fetch every source from scratch"
        type: boolean
        required: false
        default: false

# The nightly hydrates dist/raw from R2 raw/latest/ (the last-good lake) and
# re-fetches only sources past their freshness SLA (WO-10) — an interrupted or
# re-dispatched run resumes instead of re-crawling the ~2-hour serial fetch, and
# congress.gov + FEC run concurrently. The full_rebuild dispatch input bypasses
# hydration + freshness for a clean from-scratch run.
# One run at a time: a manual dispatch must never race the nightly's publish.
concurrency:
  group: etl-nightly
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    # Incremental fetch (WO-10) resumes from the hydrated lake and runs the two
    # long-pole API loops (congress.gov + FEC) concurrently, so a nightly is well
    # under an hour. A full_rebuild still walks every source from scratch — keep
    # generous headroom (GitHub's job ceiling is 6 h) so a clean rebuild can't time
    # out mid-fetch and fail to publish.
    timeout-minutes: 330
    permissions:
      contents: write        # the pipeline-version tag push at the end of the run
    env:
      PYTHONUNBUFFERED: "1"   # flush fetch progress live so a timeout shows where it stalled
      CONGRESS_GOV_API_KEY: ${{ secrets.CONGRESS_GOV_API_KEY }}
      FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: {python-version: "3.12", cache: pip}
      - run: pip install -e "./pipelines[dev]"
      - name: Set pipeline version (stamped into every provenance envelope)
        # Computed BEFORE build so dossiers carry the real release id, and the
        # end-of-run tag records exactly what was published (contracts §7).
        run: echo "PIPELINE_VERSION=etl-$(date -u +%Y.%W.%H%M)" >> "$GITHUB_ENV"
      - name: Unit tests (fail before spending API calls)
        run: pytest pipelines/tests -q
      - name: Fetch + land raw (immutable)
        # Default: hydrate dist/raw from R2 raw/latest/ and re-fetch only stale
        # sources. full_rebuild=true bypasses both for a clean from-scratch fetch.
        run: |
          if [ "${{ github.event.inputs.full_rebuild }}" = "true" ]; then
            python -m beholden_etl.jobs.fetch --full
          else
            make fetch
          fi
      - name: Transform (DuckDB) + quality gates
        run: make transform   # FAILS closed if spine resolution < 0.995
      - name: Build serving artifacts
        run: make build   # dossiers/ stylefeeds/ pins/ coverage.json
      - name: Publish
        run: make publish # serving JSON -> R2 bucket root; raw lake -> R2 /raw/{date}/
      - name: Tag pipeline version
        # Best-effort bookkeeping only — every published fact already carries
        # PIPELINE_VERSION in its provenance envelope regardless of this tag.
        # The default GITHUB_TOKEN can never push a ref whose history touches
        # .github/workflows/* (a hard GitHub anti-escalation rule, no
        # permission grant lifts it), so on a day this repo's workflow YAML
        # changed, this push fails by design. continue-on-error keeps that
        # from marking an otherwise-fully-published run as a failure.
        continue-on-error: true
        run: |
          git tag "$PIPELINE_VERSION" && git push origin "$PIPELINE_VERSION"
