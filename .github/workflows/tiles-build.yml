name: tiles-build
on:
  workflow_dispatch: {}   # manual: TIGER updates only on redistricting / vintage change
jobs:
  tiles:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Least-privilege GITHUB_TOKEN: this job only reads the repo and uploads via
    # its own scoped R2 keys — it never touches git contents.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install tippecanoe + GDAL
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev gdal-bin
          git clone --depth 1 https://github.com/felt/tippecanoe && make -C tippecanoe -j"$(nproc)" && sudo make -C tippecanoe install
      - name: Download TIGER cartographic boundaries (states, CDs, SLDU, SLDL, counties)
        run: make tiles-fetch
      - name: Build PMTiles archives
        run: make tiles-build   # -> tiles/us-{states,cd,sld,counties,context}-{vintage}.pmtiles
      - name: Upload to R2
        run: make tiles-publish
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      - name: Publish font glyphs (self-hosted — city labels, no third-party font CDN)
        # openmaptiles/fonts prebuilt PBF ranges (OFL-licensed Noto). One stack is
        # ~250 small files; MapLibre requests {fontstack}/{range}.pbf as needed.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          curl -fsSL -o fonts.zip https://github.com/openmaptiles/fonts/releases/download/v2.0/v2.0.zip
          unzip -q fonts.zip -d fonts "Noto Sans Regular/*"
          aws s3 cp "fonts/Noto Sans Regular" "s3://beholden/fonts/Noto Sans Regular" \
            --recursive --endpoint-url "$R2_ENDPOINT" \
            --content-type application/x-protobuf --cache-control "public, max-age=604800"
