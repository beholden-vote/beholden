name: tiles-build
on:
  workflow_dispatch: {}   # manual: TIGER updates only on redistricting / vintage change
jobs:
  tiles:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Install tippecanoe + GDAL
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev gdal-bin
          git clone --depth 1 https://github.com/felt/tippecanoe && make -C tippecanoe -j"$(nproc)" && sudo make -C tippecanoe install
      - name: Download TIGER cartographic boundaries (states, CDs, SLDU, SLDL)
        run: make tiles-fetch
      - name: Build PMTiles archives
        run: make tiles-build   # -> tiles/us-{states,cd,sld}-{vintage}.pmtiles
      - name: Upload to R2
        run: make tiles-publish
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
